      - CORE_PEER_CHAINCODEADDRESS=peer1.ecta.example.com:8052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.ecta.example.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.ecta.example.com:8051
      - CORE_PEER_LOCALMSPID=ECTAMSP
