  # ============================================================================
  # COUCHDB STATE DATABASES
  # ============================================================================
  
  couchdb0.ecta:
    container_name: couchdb0.ecta
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 5984:5984
    volumes:
      - couchdb0.ecta:/opt/couchdb/data
    networks:
      - fabric-network

  couchdb1.ecta:
    container_name: couchdb1.ecta
    image: couchdb:3.3
