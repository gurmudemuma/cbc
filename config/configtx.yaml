---
Organizations:
  - &OrdererOrg
      Name: OrdererOrg
      ID: OrdererMSP
      MSPDir: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/ordererOrganizations/orderer.example.com/msp
      Policies:
        Readers:
          Type: Signature
          Rule: "OR('OrdererMSP.member')"
        Writers:
          Type: Signature
          Rule: "OR('OrdererMSP.member')"
        Admins:
          Type: Signature
          Rule: "OR('OrdererMSP.admin')"
      OrdererEndpoints:
        - orderer1.orderer.example.com:7050
        - orderer2.orderer.example.com:8050
        - orderer3.orderer.example.com:9050

  - &ECTAOrg
      Name: ECTAOrg
      ID: ECTAMSP
      MSPDir: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/ecta.example.com/msp
      Policies:
        Readers:
          Type: Signature
          Rule: "OR('ECTAMSP.admin', 'ECTAMSP.peer', 'ECTAMSP.client')"
        Writers:
          Type: Signature
          Rule: "OR('ECTAMSP.admin', 'ECTAMSP.client')"
        Admins:
          Type: Signature
          Rule: "OR('ECTAMSP.admin')"
        Endorsement:
          Type: Signature
          Rule: "OR('ECTAMSP.peer')"
      AnchorPeers:
        - Host: peer0.ecta.example.com
          Port: 7051

  - &BankOrg
      Name: BankOrg
      ID: BankMSP
      MSPDir: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/bank.example.com/msp
      Policies:
        Readers:
          Type: Signature
          Rule: "OR('BankMSP.admin', 'BankMSP.peer', 'BankMSP.client')"
        Writers:
          Type: Signature
          Rule: "OR('BankMSP.admin', 'BankMSP.client')"
        Admins:
          Type: Signature
          Rule: "OR('BankMSP.admin')"
        Endorsement:
          Type: Signature
          Rule: "OR('BankMSP.peer')"
      AnchorPeers:
        - Host: peer0.bank.example.com
          Port: 9051

  - &NBEOrg
      Name: NBEOrg
      ID: NBEMSP
      MSPDir: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/nbe.example.com/msp
      Policies:
        Readers:
          Type: Signature
          Rule: "OR('NBEMSP.admin', 'NBEMSP.peer', 'NBEMSP.client')"
        Writers:
          Type: Signature
          Rule: "OR('NBEMSP.admin', 'NBEMSP.client')"
        Admins:
          Type: Signature
          Rule: "OR('NBEMSP.admin')"
        Endorsement:
          Type: Signature
          Rule: "OR('NBEMSP.peer')"
      AnchorPeers:
        - Host: peer0.nbe.example.com
          Port: 10051

  - &CustomsOrg
      Name: CustomsOrg
      ID: CustomsMSP
      MSPDir: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/customs.example.com/msp
      Policies:
        Readers:
          Type: Signature
          Rule: "OR('CustomsMSP.admin', 'CustomsMSP.peer', 'CustomsMSP.client')"
        Writers:
          Type: Signature
          Rule: "OR('CustomsMSP.admin', 'CustomsMSP.client')"
        Admins:
          Type: Signature
          Rule: "OR('CustomsMSP.admin')"
        Endorsement:
          Type: Signature
          Rule: "OR('CustomsMSP.peer')"
      AnchorPeers:
        - Host: peer0.customs.example.com
          Port: 11051

  - &ShippingOrg
      Name: ShippingOrg
      ID: ShippingMSP
      MSPDir: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/shipping.example.com/msp
      Policies:
        Readers:
          Type: Signature
          Rule: "OR('ShippingMSP.admin', 'ShippingMSP.peer', 'ShippingMSP.client')"
        Writers:
          Type: Signature
          Rule: "OR('ShippingMSP.admin', 'ShippingMSP.client')"
        Admins:
          Type: Signature
          Rule: "OR('ShippingMSP.admin')"
        Endorsement:
          Type: Signature
          Rule: "OR('ShippingMSP.peer')"
      AnchorPeers:
        - Host: peer0.shipping.example.com
          Port: 12051

Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_5: true

Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
  Capabilities:
    <<: *ApplicationCapabilities

Orderer: &OrdererDefaults
  OrdererType: etcdraft
  Addresses:
    - orderer1.orderer.example.com:7050
    - orderer2.orderer.example.com:8050
    - orderer3.orderer.example.com:9050
  EtcdRaft:
    Consenters:
      - Host: orderer1.orderer.example.com
        Port: 7050
        ClientTLSCert: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/ordererOrganizations/orderer.example.com/orderers/orderer1.orderer.example.com/tls/server.crt
        ServerTLSCert: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/ordererOrganizations/orderer.example.com/orderers/orderer1.orderer.example.com/tls/server.crt
      - Host: orderer2.orderer.example.com
        Port: 8050
        ClientTLSCert: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/ordererOrganizations/orderer.example.com/orderers/orderer2.orderer.example.com/tls/server.crt
        ServerTLSCert: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/ordererOrganizations/orderer.example.com/orderers/orderer2.orderer.example.com/tls/server.crt
      - Host: orderer3.orderer.example.com
        Port: 9050
        ClientTLSCert: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/ordererOrganizations/orderer.example.com/orderers/orderer3.orderer.example.com/tls/server.crt
        ServerTLSCert: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/ordererOrganizations/orderer.example.com/orderers/orderer3.orderer.example.com/tls/server.crt
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"

Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities

Profiles:
  CoffeeChannel:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
      Capabilities:
        <<: *OrdererCapabilities
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *ECTAOrg
        - *BankOrg
        - *NBEOrg
        - *CustomsOrg
        - *ShippingOrg
      Capabilities:
        <<: *ApplicationCapabilities

  OrdererGenesis:
    <<: *ChannelDefaults
    Capabilities:
      <<: *ChannelCapabilities
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
      Capabilities:
        <<: *OrdererCapabilities
    Consortiums:
      CoffeeConsortium:
        Organizations:
          - *ECTAOrg
          - *BankOrg
          - *NBEOrg
          - *CustomsOrg
          - *ShippingOrg
